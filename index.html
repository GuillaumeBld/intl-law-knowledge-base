<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legal Tax — Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --border: #262b36;
    --muted: #8a94a6;
    --fg: #e6ebf3;
    --accent: #6aa9ff;
    --accent-dim: #2a4a7d;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); }
  header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--panel); }
  header h1 { margin: 0; font-size: 18px; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 63px); }
  nav { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
  nav h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 14px 8px 6px; }
  nav ul { list-style: none; padding: 0; margin: 0; }
  nav li a { display: block; padding: 6px 8px; color: var(--fg); text-decoration: none; border-radius: 6px; font-size: 13px; word-break: break-word; }
  nav li a:hover { background: #1f2430; }
  nav li a.active { background: var(--accent-dim); color: #cfe1ff; }
  main { overflow-y: auto; padding: 28px 36px; max-width: 900px; }
  main h1, main h2, main h3 { line-height: 1.25; }
  main h1 { font-size: 24px; margin-top: 0; }
  main a { color: var(--accent); }
  main code { font-family: var(--mono); background: #1f2430; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  main pre { background: #1f2430; padding: 12px; border-radius: 6px; overflow-x: auto; }
  main blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 6px 14px; color: #cfd6e3; background: #131722; }
  main table { border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  main table th, main table td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  main table th { background: #1f2430; }
  .path { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  .home h1 { font-size: 26px; }
  .home p { color: #cfd6e3; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 20px; }
  .card { padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); }
  .card h3 { margin: 0 0 6px; font-size: 14px; }
  .card p { margin: 0; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div>
    <h1>Legal Tax — Knowledge Base</h1>
    <div class="sub">Grounded source-of-truth for LLMs · jurisdictions: US-FED · tax years: 2025</div>
  </div>
  <div class="sub"><a href="README.md" style="color:var(--accent);">README</a> · <a href="CLAUDE.md" style="color:var(--accent);">schema</a></div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="view"><div class="empty">Loading…</div></main>
</div>

<script>
const FILES = {
  wiki: [
    "INDEX.md",
    "us-federal-overview.md",
    "us-fed-2025-standard-deduction.md",
    "us-fed-2025-marginal-rates.md",
    "us-fed-2025-amt.md",
    "us-fed-2025-credits-and-exclusions.md",
    "us-fed-2025-estate-and-gift.md",
    "us-fed-2025-unchanged-items.md",
    "tcja-2017-effects.md",
  ],
  raw: [
    "irs-ir-2024-273-tax-year-2025-inflation-adjustments.md",
  ],
  data: [
    "jurisdictions.yaml",
    "instruments.yaml",
    "tax-years.yaml",
    "us-fed-2025-brackets.csv",
    "us-fed-2025-key-amounts.csv",
  ],
  outputs: [
    "demo-single-filer-75k-2025.md",
  ],
};

const nav = document.getElementById("nav");
const view = document.getElementById("view");

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function safeSet(el, html) {
  el.innerHTML = DOMPurify.sanitize(html, { ADD_ATTR: ["target"] });
}

function buildNav() {
  const sections = [
    { key: "home",    label: "Overview",     entries: [{ path: "__home", label: "Home" }] },
    { key: "wiki",    label: "Wiki",         entries: FILES.wiki.map(f => ({ path: `wiki/${f}`, label: f.replace(/\.md$/, "") })) },
    { key: "outputs", label: "Outputs",      entries: FILES.outputs.map(f => ({ path: `outputs/${f}`, label: f.replace(/\.md$/, "") })) },
    { key: "data",    label: "Data",         entries: FILES.data.map(f => ({ path: `data/${f}`, label: f })) },
    { key: "raw",     label: "Raw sources",  entries: FILES.raw.map(f => ({ path: `raw/${f}`, label: f.replace(/\.md$/, "") })) },
  ];
  const html = sections.map(s => `
    <h2>${esc(s.label)}</h2>
    <ul>${s.entries.map(e => `<li><a href="#${esc(e.path)}" data-path="${esc(e.path)}">${esc(e.label)}</a></li>`).join("")}</ul>
  `).join("");
  safeSet(nav, html);
}

function setActive(path) {
  document.querySelectorAll("nav a").forEach(a => a.classList.toggle("active", a.dataset.path === path));
}

function renderHome() {
  const html = `
    <div class="home">
      <h1>Legal Tax — Knowledge Base</h1>
      <p>A grounded, source-traceable knowledge base designed to feed LLMs verifiable tax facts. Every numeric claim in the wiki traces back to a file in <code>raw/</code>.</p>
      <h2>What's inside</h2>
      <div class="cards">
        <div class="card"><h3>Wiki · ${FILES.wiki.length - 1} articles</h3><p>Narrative knowledge organized by topic, with cross-links.</p></div>
        <div class="card"><h3>Data · ${FILES.data.length} files</h3><p>Tax brackets + key amounts as CSV; coverage as YAML.</p></div>
        <div class="card"><h3>Raw · ${FILES.raw.length} source</h3><p>Immutable IRS release scraped from irs.gov.</p></div>
        <div class="card"><h3>Outputs · ${FILES.outputs.length} demo</h3><p>Worked tax calc with every figure cited back to raw.</p></div>
      </div>
      <h2>File-format discipline</h2>
      <ul>
        <li>Prose → <code>.md</code> in <code>wiki/</code></li>
        <li>Tabular data (rates, thresholds) → <code>.csv</code> in <code>data/</code></li>
        <li>Config / coverage → <code>.yaml</code> in <code>data/</code></li>
        <li>Never wrap prose in JSON — degrades LLM reasoning by 27–49 points (EMNLP 2024)</li>
      </ul>
      <h2>Jump in</h2>
      <p>Start with <a href="#outputs/demo-single-filer-75k-2025.md">the demo output</a> to see a grounded tax calculation, or browse the <a href="#wiki/INDEX.md">wiki index</a>.</p>
    </div>
  `;
  safeSet(view, html);
}

function renderCSV(text) {
  const rows = text.trim().split("\n").map(r => r.split(","));
  const [head, ...body] = rows;
  return `<table><thead><tr>${head.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead>
    <tbody>${body.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}

function rewriteLinks(html) {
  return html
    .replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, target, label) => {
      const tgt = target.endsWith(".md") ? target : `${target}.md`;
      return `<a href="#wiki/${esc(tgt)}">${esc(label || target)}</a>`;
    })
    .replace(/href="(raw|wiki|data|outputs)\/([^"]+)"/g, (_, dir, file) => `href="#${dir}/${file}"`)
    .replace(/<code>(raw|wiki|data|outputs)\/([^<]+)<\/code>/g, (_, dir, file) => {
      const clean = file.replace(/[.)]+$/, "");
      return `<a href="#${dir}/${clean}"><code>${dir}/${file}</code></a>`;
    });
}

async function load(path) {
  setActive(path);
  location.hash = path;
  if (path === "__home") { renderHome(); return; }
  safeSet(view, `<div class="empty">Loading ${esc(path)}…</div>`);
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    let body;
    if (path.endsWith(".md")) {
      body = rewriteLinks(marked.parse(text));
    } else if (path.endsWith(".csv")) {
      body = renderCSV(text);
    } else {
      body = `<pre>${esc(text)}</pre>`;
    }
    safeSet(view, `<div class="path">${esc(path)}</div>${body}`);
    view.scrollTop = 0;
  } catch (e) {
    safeSet(view, `<div class="empty">Couldn't load <code>${esc(path)}</code>: ${esc(e.message)}.<br><br>If you opened this via <code>file://</code>, your browser may block <code>fetch()</code>. Serve the folder with <code>python3 -m http.server</code> or push to GitHub Pages.</div>`);
  }
}

window.addEventListener("hashchange", () => {
  const p = location.hash.slice(1) || "__home";
  load(p);
});

buildNav();
nav.addEventListener("click", e => {
  const a = e.target.closest("a[data-path]");
  if (!a) return;
  e.preventDefault();
  load(a.dataset.path);
});

load(location.hash.slice(1) || "__home");
</script>
</body>
</html>
